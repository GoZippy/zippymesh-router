<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Red sphere gradient -->
    <radialGradient id="sphere" cx="38%" cy="35%" r="65%" fx="32%" fy="28%">
      <stop offset="0%" stop-color="#E85C4A"/>
      <stop offset="45%" stop-color="#C93C32"/>
      <stop offset="100%" stop-color="#8B2222"/>
    </radialGradient>
    <mask id="zCutout">
      <rect width="64" height="64" fill="white"/>
      <!-- Bold Z as cutout (thick block letter) -->
      <path fill="black" d="M18 19 L46 19 L46 23 L26 41 L44 41 L44 45 L18 45 L18 41 L38 23 L18 23 Z"/>
    </mask>
  </defs>
  <!-- Red sphere with Z cut through -->
  <circle cx="32" cy="32" r="22" fill="url(#sphere)" mask="url(#zCutout)"/>
  <!-- Mesh nodes and edges (neutral so logo works on light or dark) -->
  <g stroke="#94a3b8" stroke-width="1.25" fill="none" opacity="0.75">
    <circle cx="18" cy="18" r="2.5" fill="#94a3b8"/>
    <circle cx="46" cy="18" r="2.5" fill="#94a3b8"/>
    <circle cx="52" cy="32" r="2.5" fill="#94a3b8"/>
    <circle cx="46" cy="46" r="2.5" fill="#94a3b8"/>
    <circle cx="18" cy="46" r="2.5" fill="#94a3b8"/>
    <circle cx="12" cy="32" r="2.5" fill="#94a3b8"/>
    <line x1="18" y1="18" x2="32" y2="32"/>
    <line x1="46" y1="18" x2="32" y2="32"/>
    <line x1="46" y1="46" x2="32" y2="32"/>
    <line x1="18" y1="46" x2="32" y2="32"/>
    <line x1="12" y1="32" x2="32" y2="32"/>
    <line x1="52" y1="32" x2="32" y2="32"/>
  </g>
</svg>
