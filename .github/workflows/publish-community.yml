name: Publish Community Edition

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.7.0)'
        required: true

permissions:
  contents: write

jobs:
  build-community:
    name: Build Community Edition
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build Community Edition
        env:
          # JWT_SECRET must be non-empty for Next.js to compile auth routes.
          # This is a build-time placeholder only — runtime uses the real secret.
          JWT_SECRET: build-time-placeholder-not-used-at-runtime
          NODE_ENV: production
        run: npm run build:community

      - name: Verify community build starts
        env:
          JWT_SECRET: ci-health-check-placeholder-minimum-32-chars
        run: |
          cd community-dist
          timeout 15 npm start &
          sleep 8
          curl -f http://localhost:20128/api/health || (echo "Health check failed" && exit 1)
          kill %1 2>/dev/null || true
        continue-on-error: false

      - name: Get version tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building community edition for $TAG"

      - name: Push community-dist to GoZippy/zippymesh-router
        env:
          GOZIPPY_PAT: ${{ secrets.GOZIPPY_PAT }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PUBLIC_REPO="GoZippy/zippymesh-router"

          # Configure git identity globally so the fresh git init in community-dist picks it up
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Publish community-dist as the main branch of the public repo
          cd community-dist

          git init
          git remote add origin "https://x-access-token:${GOZIPPY_PAT}@github.com/${PUBLIC_REPO}.git"
          git checkout -b main

          # Add all files (community-dist is already the community-safe tree)
          git add -A
          git commit -m "Community Edition $TAG

          Built from tag $TAG
          Proprietary components replaced with community stubs.

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

          # Force-push main — the public repo only ever contains community-safe code
          git push --force origin main

          echo "Published Community Edition $TAG to ${PUBLIC_REPO}"

      - name: Create GitHub Release on GoZippy/zippymesh-router
        env:
          GOZIPPY_PAT: ${{ secrets.GOZIPPY_PAT }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PUBLIC_REPO="GoZippy/zippymesh-router"
          gh release create "${TAG}" \
            --repo "${PUBLIC_REPO}" \
            --title "ZippyMesh LLM Router ${TAG}" \
            --notes "## ZippyMesh LLM Router ${TAG}

          ### Installation

          \`\`\`bash
          git clone https://github.com/${PUBLIC_REPO}.git zippymesh
          cd zippymesh
          npm install
          npm start
          \`\`\`

          ### What's included

          - Full smart routing engine with intent inference and ML scoring
          - All provider integrations (OpenAI, Anthropic, Gemini, Ollama, OpenRouter, Kilo)
          - Dashboard UI, plugin system, prompt cache, semantic cache, webhooks
          - Virtual key management with budgets and rate limits
          - MCP server for AI agent integration
          - Community marketplace for routing playbooks

          ### What requires ZippyMesh Pro

          - P2P mesh networking and peer discovery
          - ZippyCoin wallet and node payments
          - Node monetization and revenue sharing
          " \
            || echo "Release creation failed (may already exist)"
