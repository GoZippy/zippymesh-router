name: secrets-check

on:
  pull_request:
  push:
    branches:
      - ZippyMesh_LLM_main
      - dev_alpha
      - dev_beta

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run secret pattern check
        run: npm run secrets:check
