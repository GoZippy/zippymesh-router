version: "3.8"

services:
  zippy-router:
    build: .
    container_name: zippy-router
    restart: unless-stopped
    ports:
      - "20128:20128"
    environment:
      - NODE_ENV=production
      - PORT=20128
      - JWT_SECRET=${JWT_SECRET:-zippy_mesh_secret_key_change_me}
      - INITIAL_PASSWORD=${INITIAL_PASSWORD:-123456}
      - DATA_DIR=/app/data
      - SIDE_CAR_URL=http://zippy-sidecar:8080 # Future integration point
    volumes:
      - zippy-data:/app/data
    networks:
      - zippy-net
    depends_on:
      - zippy-sidecar

  zippy-sidecar:
    build: ./sidecar
    container_name: zippy-sidecar
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - zippy-net
    volumes:
      - zippy-data:/app/data

networks:
  zippy-net:
    driver: bridge

volumes:
  zippy-data:
    driver: local
